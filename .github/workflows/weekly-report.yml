name: Update TrackLink Santa Marta Dashboard

on:
  schedule:
    - cron: '0 */4 * * *'  # Cada 4 horas (00, 04, 08, 12, 16, 20 UTC = 20, 00, 04, 08, 12, 16 hora Chile)
  workflow_dispatch:          # Botón manual en la pestaña Actions

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Permite hacer push al repo (usa GITHUB_TOKEN interno, sin PAT)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer adm-zip

      - name: Download report from TrackGTS
        env:
          TL_USER:     ${{ secrets.TL_USER }}
          TL_PASSWORD: ${{ secrets.TL_PASSWORD }}
          TL_DOMAIN:   ${{ secrets.TL_DOMAIN }}
        run: node download.js

      - name: Commit and push report
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add "INFORME EXCESOS DE VELOCIDAD.xlsx"
          if git diff --staged --quiet; then
            echo "Sin cambios en el reporte."
          else
            git commit -m "chore: actualiza dashboard $(date -u +%Y-%m-%dT%H:%M)Z"
            git push
          fi
