name: Bulk History Download (60 días)

on:
  workflow_dispatch:   # Solo manual — correr UNA VEZ para poblar el historial

jobs:
  bulk-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install puppeteer adm-zip
          pip install openpyxl

      - name: Download 9 ventanas de 7 días (≈ 63 días total)
        env:
          TL_USER:     ${{ secrets.TL_USER }}
          TL_PASSWORD: ${{ secrets.TL_PASSWORD }}
          TL_DOMAIN:   ${{ secrets.TL_DOMAIN }}
        run: node bulk_download.js

      - name: Merge all windows into historical file
        run: python merge_history.py

      - name: Cleanup bulk files and commit
        run: |
          rm -f bulk_*.xlsx latest.xlsx
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add "INFORME EXCESOS DE VELOCIDAD.xlsx"
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: carga histórica 60 días $(date -u +%Y-%m-%d)"
            git push
          fi
