name: Update TrackLink Santa Marta Report

on:
  schedule:
    # Cada lunes a las 12:00 UTC (08:00 hora Chile en horario de verano, 09:00 en invierno)
    - cron: '0 12 * * 1'
  workflow_dispatch:  # Permite disparo manual desde la pestaña Actions de GitHub

permissions:
  contents: write  # Necesario para commitear el .xlsx actualizado

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer adm-zip

      - name: Download report from TrackGTS
        env:
          TL_USER: ${{ secrets.TL_USER }}
          TL_PASSWORD: ${{ secrets.TL_PASSWORD }}
          TL_DOMAIN: ${{ secrets.TL_DOMAIN }}
        run: node scripts/download.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "INFORME EXCESOS DE VELOCIDAD.xlsx"
          if git diff --staged --quiet; then
            echo "No changes to commit — el reporte de esta semana es idéntico al anterior"
          else
            git commit -m "chore: update report ($(date -u +%Y-%m-%d))"
            git push
            echo "✓ Report updated and pushed"
          fi
